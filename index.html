<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة آفاق لتحفيظ القرآن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .animate-fadeIn { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // محاكاة لنظام التنقل الذي أرسلته (App.tsx)
        const appState = {
            userRole: null,
            activeTab: 'dashboard'
        };

        function render() {
            const root = document.getElementById('app');
            
            // إذا لم يتم اختيار رتبة (Landing Page)
            if (!appState.userRole) {
                root.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-4 animate-fadeIn">
                        <div class="bg-emerald-100 w-24 h-24 rounded-[30px] flex items-center justify-center text-4xl mb-6 shadow-sm">آ</div>
                        <h1 class="text-4xl font-black text-slate-800 mb-2">مرحباً بك في آفاق</h1>
                        <p class="text-slate-500 mb-12 text-center max-w-md">بوابتكم الذكية لتعلم وحفظ القرآن الكريم</p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
                            <button onclick="selectRole('student')" class="bg-white p-8 rounded-[35px] shadow-sm border border-slate-100 hover:border-emerald-500 transition-all text-center group">
                                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">📖</div>
                                <h2 class="text-xl font-bold text-slate-800">بوابة الطالب</h2>
                            </button>
                            <button onclick="selectRole('teacher')" class="bg-white p-8 rounded-[35px] shadow-sm border border-slate-100 hover:border-emerald-500 transition-all text-center group">
                                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">👨‍🏫</div>
                                <h2 class="text-xl font-bold text-slate-800">بوابة المعلم</h2>
                            </button>
                            <button onclick="selectRole('manager')" class="bg-white p-8 rounded-[35px] shadow-sm border border-slate-100 hover:border-emerald-500 transition-all text-center group">
                                <div class="text-4xl mb-4 group-hover:scale-110 transition-transform">🏛️</div>
                                <h2 class="text-xl font-bold text-slate-800">إدارة المنصة</h2>
                            </button>
                        </div>
                    </div>
                `;
            } else {
                // شاشة لوحة التحكم (Dashboard)
                root.innerHTML = `
                    <div class="min-h-screen flex animate-fadeIn">
                        <div class="w-64 bg-white border-l border-slate-100 p-6 flex flex-col">
                            <div class="text-2xl font-black text-emerald-600 mb-12">آفاق</div>
                            <nav class="space-y-4 flex-1">
                                <div class="p-4 bg-emerald-50 text-emerald-700 rounded-2xl font-bold text-sm">🏠 لوحة التحكم</div>
                                <div class="p-4 text-slate-400 rounded-2xl text-sm cursor-not-allowed">📊 الإحصائيات</div>
                            </nav>
                            <button onclick="logout()" class="text-red-400 text-sm font-bold p-4 hover:bg-red-50 rounded-2xl transition-colors">🚪 تسجيل الخروج</button>
                        </div>
                        <div class="flex-1 p-12 bg-slate-50">
                            <h2 class="text-3xl font-black text-slate-800 mb-8">مرحباً بك، ${getRoleName(appState.userRole)}</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="bg-white p-8 rounded-[40px] shadow-sm border border-slate-100">
                                    <h3 class="font-bold text-slate-400 mb-4">الحالة الحالية</h3>
                                    <p class="text-slate-600">هذه هي النسخة التجريبية المدمجة من مشروعك. جاري تفعيل باقي الأقسام...</p>
                                </div>
                                <div class="bg-emerald-600 p-8 rounded-[40px] shadow-xl text-white">
                                    <h3 class="font-bold opacity-80 mb-4">رسالة اليوم</h3>
                                    <p class="text-xl">"خيركم من تعلم القرآن وعلمه"</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        function selectRole(role) {
            appState.userRole = role;
            render();
        }

        function logout() {
            appState.userRole = null;
            render();
        }

        function getRoleName(role) {
            if (role === 'student') return 'طالبنا المثابر';
            if (role === 'teacher') return 'أستاذنا الفاضل';
            return 'مدير المنصة';
        }

        render();
    </script>
</body>
</html>
