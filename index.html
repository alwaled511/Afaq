<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة آفاق لتحفيظ القرآن</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <nav class="bg-white shadow-sm p-4">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="text-2xl font-bold text-emerald-600">آفاق</div>
                <div class="space-x-4 space-x-reverse">
                    <button class="text-gray-600">الرئيسية</button>
                    <button class="bg-emerald-600 text-white px-4 py-2 rounded-lg">تسجيل الدخول</button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto mt-16 px-4 text-center">
            <div class="mb-8">
                <div class="w-20 h-20 bg-emerald-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="text-4xl text-emerald-600">آ</span>
                </div>
                <h1 class="text-5xl font-bold text-slate-800 mb-4">منصة آفاق</h1>
                <p class="text-xl text-slate-600">بوابتكم الذكية لتعلم وحفظ القرآن الكريم بأحدث التقنيات</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-12">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                    <div class="text-4xl mb-4">📖</div>
                    <h2 class="text-2xl font-bold mb-2">بوابة الطالب</h2>
                    <p class="text-slate-500">حفظ، مراجعة، وتواصل ذكي مع المعلم المساعد</p>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                    <div class="text-4xl mb-4">👨‍🏫</div>
                    <h2 class="text-2xl font-bold mb-2">بوابة المعلم</h2>
                    <p class="text-slate-500">تسميع، ترحيل آلي، ورصد درجات الطلاب بدقة</p>
                </div>
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
                    <div class="text-4xl mb-4">🏛️</div>
                    <h2 class="text-2xl font-bold mb-2">إدارة المنصة</h2>
                    <p class="text-slate-500">إشراف كامل وتقارير ختامية لمتابعة سير الحلقات</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
